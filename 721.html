<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PROJECT 721 · سیستم جامع</title>
    <link rel="icon" href="https://uploadkon.ir/uploads/bc8d07_26ChatGPT-Image-Jul-7-2026-07-35-41-PM.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', sans-serif;
            background: #070a12;
            color: #d0ddf0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(ellipse at 20% 30%, #0e1a2a, #04070c);
        }

        /* ===== TOPBAR ===== */
        #topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: rgba(4, 8, 16, 0.4);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(19, 244, 210, 0.06);
            min-height: 52px;
            flex-shrink: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            object-fit: contain;
            background: rgba(0, 0, 0, 0.2);
            padding: 2px;
        }

        .brand-name {
            font-size: 0.85rem;
            font-weight: 600;
            background: linear-gradient(135deg, #13f4d2, #0bc5a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-icon {
            background: transparent;
            border: none;
            color: #13f4d2;
            font-size: 1rem;
            padding: 4px 6px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-icon:hover {
            background: rgba(19, 244, 210, 0.06);
            color: #13f4d2;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            position: fixed;
            top: 0;
            left: -100%;
            width: 240px;
            max-width: 80vw;
            height: 100%;
            background: rgba(10, 18, 32, 0.92);
            backdrop-filter: blur(32px);
            border-right: 1px solid rgba(19, 244, 210, 0.04);
            z-index: 1000;
            transition: left 0.35s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0.8rem;
            overflow-y: auto;
            box-shadow: 10px 0 60px rgba(0, 0, 0, 0.3);
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.30);
            backdrop-filter: blur(3px);
            z-index: 999;
            display: none;
        }

        .sidebar-overlay.active {
            display: block;
        }

        .sidebar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 0.6rem;
            border-bottom: 1px solid rgba(19, 244, 210, 0.04);
            margin-bottom: 0.6rem;
        }

        .sidebar-header .brand {
            font-weight: 700;
            font-size: 0.9rem;
            background: linear-gradient(135deg, #13f4d2, #0bc5a8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-close {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(19, 244, 210, 0.04);
            padding: 0.2rem 0.5rem;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            color: #13f4d2;
            transition: 0.3s;
        }

        .sidebar-close:hover {
            color: #13f4d2;
            border-color: rgba(19, 244, 210, 0.1);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .sidebar-nav .menu-item {
            padding: 8px 12px;
            color: #6a8aaa;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
            background: transparent;
            width: 100%;
            text-align: right;
            font-family: inherit;
            cursor: pointer;
            transition: 0.15s;
            border-radius: 8px;
            text-decoration: none;
        }

        .sidebar-nav .menu-item:hover {
            background: rgba(19, 244, 210, 0.04);
            color: #13f4d2;
        }

        .sidebar-nav .menu-item.active {
            background: rgba(19, 244, 210, 0.08);
            color: #13f4d2;
        }

        .sidebar-nav .menu-item i {
            width: 18px;
            color: #13f4d2;
            font-size: 0.8rem;
        }

        .sidebar-nav .menu-item .badge {
            margin-right: auto;
            font-size: 0.4rem;
            padding: 1px 8px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.08);
            color: #13f4d2;
        }

        .sidebar-footer {
            margin-top: auto;
            padding-top: 0.6rem;
            border-top: 1px solid rgba(19, 244, 210, 0.04);
            font-size: 0.45rem;
            color: rgba(19, 244, 210, 0.4);
            text-align: center;
        }

        /* ===== CONTENT ===== */
        #content {
            flex: 1;
            padding: 12px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .glass {
            background: rgba(10, 18, 32, 0.4);
            backdrop-filter: blur(14px);
            border: 1px solid rgba(19, 244, 210, 0.04);
            border-radius: 14px;
            padding: 14px 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        }

        .card-title {
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #13f4d2;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 600;
        }

        .card-title .badge-count {
            font-size: 0.35rem;
            padding: 1px 10px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.08);
            color: #13f4d2;
        }

        /* ===== EMPTY ===== */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 200px;
            color: rgba(19, 244, 210, 0.1);
        }

        /* ===== RECORD CARD ===== */
        .record-card {
            background: rgba(16, 28, 48, 0.08);
            border-radius: 10px;
            margin-bottom: 6px;
            border-right: 3px solid rgba(19, 244, 210, 0.15);
            transition: 0.2s;
            overflow: hidden;
            cursor: pointer;
        }

        .record-card:hover {
            background: rgba(19, 244, 210, 0.04);
        }

        .record-card .weight-badge {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.06);
            color: #13f4d2;
            margin-right: 4px;
        }

        .record-card .weight-badge.low {
            opacity: 0.3;
        }

        .card-header {
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .card-header .left {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .card-header .id {
            font-weight: 600;
            color: #13f4d2;
            font-size: 0.55rem;
        }

        .card-header .person {
            font-size: 0.45rem;
            color: rgba(19, 244, 210, 0.6);
            background: rgba(19, 244, 210, 0.04);
            padding: 1px 8px;
            border-radius: 30px;
            border: 1px solid rgba(19, 244, 210, 0.04);
        }

        .card-header .date {
            color: rgba(19, 244, 210, 0.3);
            font-size: 0.4rem;
        }

        .card-header .event {
            font-size: 0.5rem;
            font-weight: 500;
            color: #c0d8f0;
        }

        .card-header .expand-icon {
            color: rgba(19, 244, 210, 0.4);
            font-size: 0.6rem;
            transition: transform 0.3s ease;
        }

        .card-header .expand-icon.open {
            transform: rotate(180deg);
        }

        .card-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 10px;
        }

        .card-body.open {
            max-height: 2500px;
            padding: 0 10px 10px 10px;
        }

        .card-body .section {
            margin-top: 6px;
            padding: 6px 8px;
            border-radius: 6px;
            background: rgba(19, 244, 210, 0.02);
            border-right: 2px solid rgba(19, 244, 210, 0.06);
        }

        .card-body .section .section-label {
            font-size: 0.35rem;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            color: rgba(19, 244, 210, 0.4);
            font-weight: 600;
        }

        .card-body .section .section-content {
            font-size: 0.5rem;
            color: #c0d8f0;
            line-height: 1.7;
            margin-top: 2px;
        }

        .card-body .hypothesis-item {
            font-size: 0.45rem;
            color: rgba(19, 244, 210, 0.5);
            padding: 2px 0;
            border-bottom: 1px solid rgba(19, 244, 210, 0.02);
        }

        .card-body .pattern-item {
            font-size: 0.45rem;
            color: #13f4d2;
            padding: 2px 0;
            border-bottom: 1px solid rgba(19, 244, 210, 0.02);
        }

        .card-body .pattern-item .p-desc {
            color: rgba(19, 244, 210, 0.4);
            font-size: 0.4rem;
        }

        /* ===== AXIS ===== */
        .axis-container {
            margin-top: 4px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 40px;
            padding: 8px 12px;
            border: 1px solid rgba(19, 244, 210, 0.04);
            position: relative;
        }

        .axis-track {
            position: relative;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #dc2626 0%, #dc2626 20%, #f59e0b 40%, #fbbf24 48%, #22c55e 52%, #3b82f6 60%, #8b5cf6 80%, #8b5cf6 100%);
            border-radius: 40px;
            overflow: visible;
        }

        .axis-track .fill-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, rgba(220, 38, 38, 0.2), rgba(139, 92, 246, 0.2));
            border-radius: 40px;
            transition: width 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .axis-track .indicator {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 22px;
            height: 22px;
            background: radial-gradient(circle at 30% 30%, #f8fafc, #94a3b8);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: left 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .axis-track .indicator .dot-inner {
            width: 8px;
            height: 8px;
            background: radial-gradient(circle at 40% 35%, #1e293b, #0f172a);
            border-radius: 50%;
        }

        .axis-center-line {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 100%;
            background: rgba(255, 255, 255, 0.15);
            transform: translateX(-50%);
            z-index: 5;
        }

        .axis-ticks {
            display: flex;
            justify-content: space-between;
            padding: 6px 4px 0;
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.2);
            position: relative;
        }

        .axis-ticks .tick-main {
            color: rgba(19, 244, 210, 0.3);
            font-weight: 600;
        }

        .axis-ticks .tick-negative {
            color: rgba(239, 68, 68, 0.3);
        }

        .axis-ticks .tick-positive {
            color: rgba(52, 211, 153, 0.3);
        }

        .axis-value {
            text-align: center;
            font-size: 0.5rem;
            color: #13f4d2;
            font-weight: 600;
            margin-top: 4px;
        }

        /* ===== PROFILE AXIS CARD ===== */
        .profile-axis-card {
            background: rgba(16, 28, 48, 0.06);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-right: 3px solid rgba(19, 244, 210, 0.1);
            transition: 0.2s;
        }

        .profile-axis-card:hover {
            background: rgba(19, 244, 210, 0.02);
        }

        .profile-axis-card .pa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .profile-axis-card .pa-name {
            font-size: 0.55rem;
            font-weight: 600;
            color: #13f4d2;
        }

        .profile-axis-card .pa-weight {
            font-size: 0.4rem;
            padding: 1px 10px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.06);
            color: #13f4d2;
        }

        .profile-axis-card .pa-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(19, 244, 210, 0.04);
        }

        .profile-axis-card .pa-tags .tag {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.04);
            border: 1px solid rgba(19, 244, 210, 0.04);
            color: rgba(19, 244, 210, 0.6);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .profile-axis-card .pa-tags .tag .effect {
            font-size: 0.35rem;
        }

        .profile-axis-card .pa-tags .tag .effect.positive {
            color: #34d399;
        }

        .profile-axis-card .pa-tags .tag .effect.negative {
            color: #ef4444;
        }

        .profile-axis-card .pa-info {
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.25);
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(19, 244, 210, 0.02);
        }

        /* ===== PATTERN AXIS CARD ===== */
        .pattern-axis-card {
            background: rgba(16, 28, 48, 0.06);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            border-right: 3px solid rgba(19, 244, 210, 0.1);
        }

        .pattern-axis-card .pa-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }

        .pattern-axis-card .pa-name {
            font-size: 0.55rem;
            font-weight: 600;
            color: #13f4d2;
        }

        .pattern-axis-card .pa-weight {
            font-size: 0.4rem;
            padding: 1px 10px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.06);
            color: #13f4d2;
        }

        .pattern-axis-card .pa-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(19, 244, 210, 0.04);
        }

        .pattern-axis-card .pa-tags .tag {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.04);
            border: 1px solid rgba(19, 244, 210, 0.04);
            color: rgba(19, 244, 210, 0.6);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pattern-axis-card .pa-tags .tag .effect {
            font-size: 0.35rem;
        }

        .pattern-axis-card .pa-tags .tag .effect.positive {
            color: #34d399;
        }

        .pattern-axis-card .pa-tags .tag .effect.negative {
            color: #ef4444;
        }

        .pattern-axis-card .pa-info {
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.25);
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid rgba(19, 244, 210, 0.02);
        }

        /* ===== NEEDS & INTERESTS ===== */
        .needs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .needs-column {
            background: rgba(16, 28, 48, 0.04);
            border-radius: 10px;
            padding: 10px 12px;
            border: 1px solid rgba(19, 244, 210, 0.04);
        }

        .needs-column .col-title {
            font-size: 0.5rem;
            font-weight: 600;
            color: #13f4d2;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .need-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 4px 0;
            border-bottom: 1px solid rgba(19, 244, 210, 0.02);
        }

        .need-item:last-child {
            border-bottom: none;
        }

        .need-item .n-left {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .need-item .n-title {
            font-size: 0.5rem;
            color: #c0d8f0;
        }

        .need-item .n-count {
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.3);
        }

        .need-item .n-stars {
            color: #f59e0b;
            font-size: 0.5rem;
            letter-spacing: 1px;
        }

        .need-item .n-weight {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.04);
            color: rgba(19, 244, 210, 0.4);
        }

        .need-item .n-last {
            font-size: 0.35rem;
            color: rgba(19, 244, 210, 0.2);
        }

        /* ===== PRIORITIES ===== */
        .priority-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .priority-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            background: rgba(16, 28, 48, 0.04);
            border-radius: 8px;
            border-right: 3px solid rgba(19, 244, 210, 0.15);
            transition: 0.2s;
        }

        .priority-item:hover {
            background: rgba(19, 244, 210, 0.02);
        }

        .priority-item .p-rank {
            font-size: 0.6rem;
            font-weight: 700;
            color: #13f4d2;
            min-width: 24px;
        }

        .priority-item .p-title {
            font-size: 0.5rem;
            color: #c0d8f0;
            flex: 1;
        }

        .priority-item .p-count {
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.3);
        }

        .priority-item .p-stars {
            color: #f59e0b;
            font-size: 0.5rem;
            letter-spacing: 1px;
        }

        .priority-item .p-badge {
            font-size: 0.35rem;
            padding: 1px 10px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.04);
            color: rgba(19, 244, 210, 0.4);
        }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 10px;
            border-bottom: 1px solid rgba(19, 244, 210, 0.04);
            padding-bottom: 6px;
        }

        .tab-btn {
            padding: 4px 16px;
            border: none;
            background: transparent;
            color: rgba(19, 244, 210, 0.3);
            font-family: inherit;
            font-size: 0.5rem;
            cursor: pointer;
            border-radius: 30px;
            transition: 0.2s;
        }

        .tab-btn:hover {
            color: rgba(19, 244, 210, 0.5);
        }

        .tab-btn.active {
            color: #13f4d2;
            background: rgba(19, 244, 210, 0.04);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* ===== WINDOW INFO ===== */
        .window-info {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 0.4rem;
            color: rgba(19, 244, 210, 0.3);
        }

        .window-info .win-item {
            padding: 2px 10px;
            border-radius: 30px;
            background: rgba(19, 244, 210, 0.02);
            border: 1px solid rgba(19, 244, 210, 0.02);
        }

        .window-info .win-item .num {
            color: #13f4d2;
            font-weight: 600;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar {
            width: 3px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(19, 244, 210, 0.01);
        }
        ::-webkit-scrollbar-thumb {
            background: #13f4d2;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(19, 244, 210, 0.6);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            #topbar {
                padding: 6px 10px;
            }
            #content {
                padding: 6px 8px;
            }
            .brand-name {
                font-size: 0.7rem;
            }
            .logo {
                width: 22px;
                height: 22px;
            }
            .sidebar {
                width: 200px;
                padding: 0.6rem;
            }
            .pattern-axis-card .pa-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .profile-axis-card .pa-header {
                flex-direction: column;
                align-items: flex-start;
            }
            .needs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- TOPBAR -->

        // ---- ابزارهای کمکی ----
        function getToday() {
            return new Date().toISOString().split('T')[0];
        }

        function daysBetween(date1, date2) {
            const d1 = new Date(date1);
            const d2 = new Date(date2);
            return Math.floor((d2 - d1) / (1000 * 60 * 60 * 24));
        }

        function toPersianDate(dateStr) {
            const d = new Date(dateStr);
            const year = d.getFullYear() - 621;
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function getTagWeight(tag, recordDate) {
            const today = getToday();
            const age = daysBetween(recordDate, today);
            const expiry = tag.expiry || 30;

            if (age >= expiry) return 0;
            if (age <= 0) return tag.effect?.score || tag.weight || 3;

            const remaining = expiry - age;
            const ratio = remaining / expiry;
            return (tag.effect?.score || tag.weight || 3) * ratio;
        }

        function getTagRawWeight(tag) {
            return tag.effect?.score || tag.weight || 3;
        }

        function scoreToAxisPercent(score) {
            const clamped = Math.min(Math.max(score, -10), 10);
            return ((clamped + 10) / 20) * 100;
        }

        function getStars(count) {
            const stars = Math.min(Math.ceil(count / 3), 5);
            return '★'.repeat(stars) + '☆'.repeat(5 - stars);
        }

        // ---- پردازشگر الگو (PatternProcessor) ----
        function PatternProcessor(records) {
            const patterns = {};

            records.forEach(record => {
                (record.tags || []).forEach(tag => {
                    if (tag.category !== 'الگو') return;

                    const weight = getTagWeight(tag, record.date);
                    if (weight === 0) return;

                    if (!patterns[tag.title]) {
                        patterns[tag.title] = {
                            title: tag.title,
                            totalWeight: 0,
                            count: 0,
                            axis: tag.effect?.axis || 'trust',
                            records: [],
                            effects: []
                        };
                    }

                    patterns[tag.title].totalWeight += weight;
                    patterns[tag.title].count += 1;
                    patterns[tag.title].records.push(record.id);
                    patterns[tag.title].effects.push({
                        score: tag.effect.score,
                        axis: tag.effect.axis,
                        expiry: tag.expiry
                    });
                });
            });

            return Object.values(patterns).map(p => {
                const avgScore = p.totalWeight / p.count;
                return {
                    title: p.title,
                    score: Math.round(avgScore * 10) / 10,
                    axis: p.axis,
                    occurrences: p.count,
                    records: p.records,
                    effects: p.effects,
                    weight: Math.round((p.totalWeight / p.count) * 10) / 10,
                    axisPercent: scoreToAxisPercent(avgScore)
                };
            }).sort((a, b) => b.score - a.score);
        }

        // ---- پردازشگر پروفایل (ProfileProcessor) با محورهای دقیق ----
        function ProfileProcessor(records) {
            // مقداردهی اولیه محورها
            const axes = {};
            Object.keys(PROFILE_AXES).forEach(key => {
                axes[key] = { total: 0, count: 0, tags: [] };
            });

            records.forEach(record => {
                (record.tags || []).forEach(tag => {
                    if (tag.category !== 'پروفایل') return;

                    const weight = getTagWeight(tag, record.date);
                    if (weight === 0) return;

                    // پیدا کردن محور مناسب برای این تگ
                    let foundAxis = null;
                    for (const [axisKey, axisData] of Object.entries(PROFILE_AXES)) {
                        if (axisData.tags.includes(tag.title)) {
                            foundAxis = axisKey;
                            break;
                        }
                    }

                    if (foundAxis && axes[foundAxis]) {
                        axes[foundAxis].total += weight;
                        axes[foundAxis].count += 1;
                        if (!axes[foundAxis].tags.includes(tag.title)) {
                            axes[foundAxis].tags.push(tag.title);
                        }
                    }
                });
            });

            // ساخت نتیجه نهایی
            const result = {};
            Object.keys(axes).forEach(key => {
                const avg = axes[key].count > 0 ? axes[key].total / axes[key].count : 0;
                result[key] = {
                    label: PROFILE_AXES[key].label,
                    icon: PROFILE_AXES[key].icon,
                    color: PROFILE_AXES[key].color,
                    score: Math.round(avg * 10) / 10,
                    axisPercent: scoreToAxisPercent(avg),
                    count: axes[key].count,
                    tags: axes[key].tags
                };
            });

            return result;
        }

        // ---- پردازشگر نیازها و علاقه‌ها ----
        function NeedsInterestsProcessor(records) {
            const needs = {};
            const interests = {};

            records.forEach(record => {
                (record.tags || []).forEach(tag => {

                                count: 0,
                                weightSum: 0,
                                lastSeen: record.date,
                                records: []
                            };
                        }
                        needs[tag.title].count += 1;
                        needs[tag.title].weightSum += getTagRawWeight(tag);
                        needs[tag.title].records.push(record.id);
                        if (record.date > needs[tag.title].lastSeen) {
                            needs[tag.title].lastSeen = record.date;
                        }
                    }

                    if (tag.category === 'علاقه') {
                        if (!interests[tag.title]) {
                            interests[tag.title] = {
                                title: tag.title,
                                count: 0,
                                weightSum: 0,
                                lastSeen: record.date,
                                records: []
                            };
                        }
                        interests[tag.title].count += 1;
                        interests[tag.title].weightSum += getTagRawWeight(tag);
                        interests[tag.title].records.push(record.id);
                        if (record.date > interests[tag.title].lastSeen) {
                            interests[tag.title].lastSeen = record.date;
                        }
                    }
                });
            });

            const needsArray = Object.values(needs).map(n => ({
                ...n,
                score: Math.round((n.weightSum / n.count) * 10) / 10,
                stars: getStars(n.count)
            })).sort((a, b) => b.count - a.count);

            const interestsArray = Object.values(interests).map(i => ({
                ...i,
                score: Math.round((i.weightSum / i.count) * 10) / 10,
                stars: getStars(i.count)
            })).sort((a, b) => b.count - a.count);

            const allItems = [...needsArray, ...interestsArray];
            const priorities = allItems.sort((a, b) => b.count - a.count).slice(0, 10);

            return {
                needs: needsArray,
                interests: interestsArray,
                priorities: priorities
            };
        }

        // ============================================================
        // STATE
        // ============================================================
        let currentPage = 'dashboard';
        let expandedCard = null;
        let needsTab = 'needs';

        // ============================================================
        // RENDER
        // ============================================================
        function render() {
            const content = document.getElementById('content');

            document.getElementById('recordBadge').textContent = RECORDS.length;

            const patterns = PatternProcessor(RECORDS);
            document.getElementById('patternBadge').textContent = patterns.length;

            const needsData = NeedsInterestsProcessor(RECORDS);
            document.getElementById('needsBadge').textContent = needsData.priorities.length;

            if (currentPage === 'dashboard') {
                content.innerHTML = `<div class="empty-state"></div>`;
            } else if (currentPage === 'records') {
                content.innerHTML = renderRecords();
            } else if (currentPage === 'patterns') {
                content.innerHTML = renderPatterns(patterns);
            } else if (currentPage === 'profile') {
                content.innerHTML = renderProfile();
            } else if (currentPage === 'needs') {
                content.innerHTML = renderNeeds(needsData);
            }
        }

        // ============================================================
        // RENDER RECORDS
        // ============================================================
        function renderRecords() {
            const today = getToday();

            return `
                <div class="glass">
                    <div class="card-title">
                        <i class="fas fa-folder-open"></i> همه مشاهدات
                        <span class="badge-count">${RECORDS.length}</span>
                    </div>
                    <div class="window-info">
                        <span class="win-item">📅 امروز: <span class="num">${toPersianDate(today)}</span></span>
                    </div>
                    ${RECORDS.map(r => renderRecordCard(r)).join('')}
                </div>
            `;
        }

        // ============================================================
        // RENDER RECORD CARD
        // ============================================================
        function renderRecordCard(record) {
            const isOpen = expandedCard === record.id;
            const today = getToday();
            const age = daysBetween(record.date, today);

            const tagsHtml = (record.tags || []).map(t => {
                const weight = getTagWeight(t, record.date);
                const remaining = Math.max(0, t.expiry - age);
                const isExpired = weight === 0;
                const effectClass = (t.effect?.score || 0) > 0 ? 'positive' : 'negative';
                const displayWeight = t.effect?.score || t.weight || 3;

                return `
                    <span style="font-size:0.35rem;padding:1px 8px;border-radius:30px;background:${isExpired ? 'rgba(239,68,68,0.08)' : 'rgba(19,244,210,0.04)'};border:1px solid ${isExpired ? 'rgba(239,68,68,0.1)' : 'rgba(19,244,210,0.04)'};color:${isExpired ? '#ef4444' : 'rgba(19,244,210,0.6)'};">
                        ${t.category}: ${t.title}
                        <span class="effect ${effectClass}">[${displayWeight > 0 ? '+' : ''}${displayWeight}]</span>
                        ${isExpired ? '⛔' : `⏳${remaining}روز`}
                    </span>
                `;
            }).join('');

            const hypsHtml = (record.hypotheses || []).map(h =>
                `<div class="hypothesis-item">• ${h}</div>`
            ).join('');

            const patternsHtml = (record.patterns || []).map(p =>
                `<div class="pattern-item">${p.title}<div class="p-desc">${p.description} · تکرار: ${p.occurrences}</div></div>`
            ).join('');

            let totalWeight = 0;
            let totalMaxWeight = 0;
            (record.tags || []).forEach(t => {
                const w = getTagWeight(t, record.date);
                totalWeight += Math.abs(w);
                totalMaxWeight += Math.abs(t.effect?.score || t.weight || 3);
            });
            const weightPercent = totalMaxWeight > 0 ? Math.round((totalWeight / totalMaxWeight) * 100) : 0;
            const weightClass = weightPercent < 30 ? 'low' : '';

            return `
                <div class="record-card" onclick="toggleCard('${record.id}')">
                    <div class="card-header">
                        <div class="left">
                            <span class="id">${record.id}</span>
                            <span class="person">${record.person}</span>
                            <span class="date">${toPersianDate(record.date)} ${record.time || ''}</span>
                            <span class="event">${record.event}</span>
                            <span class="weight-badge ${weightClass}">⚖️ ${weightPercent}%</span>
                            ${age > 0 ? `<span style="font-size:0.35rem;color:rgba(19,244,210,0.2);">(${age} روز پیش)</span>` : ''}
                        </div>
                        <span class="expand-icon ${isOpen ? 'open' : ''}"><i class="fas fa-chevron-down"></i></span>
                    </div>
                    <div class="card-body ${isOpen ? 'open' : ''}">
                        <div class="section">
                            <div class="section-label"><i class="fas fa-eye"></i> مشاهده</div>
                            <div class="section-content">${record.observation.text}</div>
                            ${record.observation.details ? `<div style="font-size:0.45rem;color:rgba(19,244,210,0.3);margin-top:2px;">${record.observation.details}</div>` : ''}
                        </div>

                        ${record.hypotheses && record.hypotheses.length > 0 ? `
                            <div class="section" style="border-right-color:rgba(245,158,11,0.2);">
                                <div class="section-label" style="color:#f59e0b;"><i class="fas fa-lightbulb"></i> فرضیه‌ها</div>
                                ${hypsHtml}
                            </div>
                        ` : ''}

                        ${record.patterns && record.patterns.length > 0 ? `
                            <div class="section" style="border-right-color:rgba(139,92,246,0.2);">
                                <div class="section-label" style="color:#8b5cf6;"><i class="fas fa-stream"></i> الگوها</div>
                                ${patternsHtml}
                            </div>
                        ` : ''}

                        ${record.tags && record.tags.length > 0 ? `
                            <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;padding-top:4px;border-top:1px solid rgba(19,244,210,0.02);">
                                ${tagsHtml}
                            </div>
                        ` : ''}

                        ${record.links && record.links.length > 0 ? `
                            <div style="font-size:0.4rem;color:rgba(19,244,210,0.3);margin-top:4px;padding-top:4px;border-top:1px solid rgba(19,244,210,0.02);">
                                🔗 لینک‌ها: ${record.links.join('، ')}
                                ${record.linksText ? `· ${record.linksText}` : ''}
                            </div>
                        ` : ''}

                        <div style="font-size:0.35rem;color:rgba(19,244,210,0.15);margin-top:4px;padding-top:4px;border-top:1px solid rgba(19,244,210,0.02);">
                            سن: ${age} روز · وزن در تحلیل: ${weightPercent}%
                        </div>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER AXIS
        // ============================================================
        function renderAxis(percent, label = '', color = '#13f4d2') {
            const clamped = Math.min(Math.max(percent, 0), 100);
            const score = ((clamped / 100) * 20) - 10;
            const displayScore = Math.round(score * 10) / 10;

            return `
                <div class="axis-container">
                    <div class="axis-track">
                        <div class="axis-center-line"></div>
                        <div class="fill-progress" style="width:${clamped}%;"></div>
                        <div class="indicator" style="left:${clamped}%;">
                            <div class="dot-inner"></div>
                        </div>
                    </div>
                    <div class="axis-ticks">
                        <span class="tick-negative">-۱۰</span>
                        <span>-۵</span>
                        <span class="tick-main">۰</span>
                        <span>+۵</span>
                        <span class="tick-positive">+۱۰</span>
                    </div>
                    <div class="axis-value" style="color:${color};">${displayScore > 0 ? '+' : ''}${displayScore} ${label}</div>
                </div>
            `;
        }

        // ============================================================
        // RENDER PATTERNS
        // ============================================================
        function renderPatterns(patterns) {
            const today = getToday();

            if (patterns.length === 0) {
                return `
                    <div class="glass">
                        <div class="card-title"><i class="fas fa-brain"></i> الگوها</div>
                        <div style="text-align:center;padding:30px 0;color:rgba(19,244,210,0.2);font-size:0.6rem;">
                            <i class="fas fa-inbox" style="font-size:2rem;display:block;margin-bottom:10px;"></i>
                            هیچ الگویی شناسایی نشد
                        </div>
                    </div>
                `;
            }

            return `
                <div class="glass">
                    <div class="card-title">
                        <i class="fas fa-brain"></i> الگوهای شناسایی شده
                        <span class="badge-count">${patterns.length}</span>
                    </div>
                    <div class="window-info">
                        <span class="win-item">📅 امروز: <span class="num">${toPersianDate(today)}</span></span>
                        <span class="win-item">📊 الگوهای فعال: <span class="num">${patterns.length}</span></span>
                    </div>
                    ${patterns.map(p => renderPatternAxis(p)).join('')}
                </div>

                <div class="glass" style="background:rgba(19,244,210,0.02);">
                    <div class="card-title"><i class="fas fa-info-circle"></i> راهنمای محور</div>
                    <div style="font-size:0.4rem;color:rgba(19,244,210,0.3);line-height:1.8;text-align:center;">
                        <p>🔴 <strong>منفی</strong> ← ۰ (مرکز) → <strong>مثبت</strong> 🟢</p>
                        <p style="font-size:0.35rem;">اعداد از -۱۰ تا +۱۰ با صفر در مرکز</p>
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER PATTERN AXIS
        // ============================================================
        function renderPatternAxis(pattern) {
            const percent = pattern.axisPercent || 50;

            const effectHtml = (pattern.effects || []).slice(0, 3).map(e =>
                `<span class="tag">${e.axis}: <span class="effect ${e.score > 0 ? 'positive' : 'negative'}">${e.score > 0 ? '+' : ''}${e.score}</span></span>`
            ).join('');

            return `
                <div class="pattern-axis-card">
                    <div class="pa-header">
                        <span class="pa-name">${pattern.title}</span>
                        <span class="pa-weight">${pattern.occurrences} بار · امتیاز ${pattern.score}</span>
                    </div>

                    ${renderAxis(percent, `(${pattern.axis})`)}

                    <div class="pa-tags">
                        ${effectHtml}
                        <span class="tag">
                            📄 ${pattern.records.join('، ')}
                        </span>
                    </div>

                    <div class="pa-info">
                        وزن‌گذاری شده: ${pattern.weight} · ${pattern.occurrences} بار تکرار
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER PROFILE
        // ============================================================
        function renderProfile() {
            const profile = ProfileProcessor(RECORDS);
            const today = getToday();

            const profileHtml = Object.entries(profile).map(([key, data]) => {
                const percent = data.axisPercent || 50;
                const color = data.color || '#13f4d2';

                return `
                    <div class="profile-axis-card">
                        <div class="pa-header">
                            <span class="pa-name">${data.icon} ${data.label}</span>
                            <span class="pa-weight">${data.count} مشاهده · امتیاز ${data.score}</span>
                        </div>

                        ${renderAxis(percent, `(${data.label})`, color)}

                        <div class="pa-tags">
                            ${data.tags.map(t => `
                                <span class="tag">${t}</span>
                            `).join('')}
                            ${data.tags.length === 0 ? '<span class="tag" style="color:rgba(19,244,210,0.2);">هیچ تگی ثبت نشده</span>' : ''}
                        </div>

                        <div class="pa-info">
                            ${data.count} بار مشاهده · ${data.tags.length} تگ مرتبط
                        </div>
                    </div>
                `;
            }).join('');

            return `
                <div class="glass">
                    <div class="card-title">
                        <i class="fas fa-user"></i> پروفایل شخصیت
                        <span class="badge-count">MR721AS</span>
                    </div>
                    <div class="window-info">
                        <span class="win-item">📅 امروز: <span class="num">${toPersianDate(today)}</span></span>
                        <span class="win-item">📊 ${RECORDS.length} مشاهده</span>
                    </div>
                    ${profileHtml}
                    <div style="font-size:0.35rem;color:rgba(19,244,210,0.15);text-align:center;margin-top:6px;">
                        🔴 منفی ← ۰ (مرکز) → مثبت 🟢
                    </div>
                </div>
            `;
        }

        // ============================================================
        // RENDER NEEDS & INTERESTS
        // ============================================================
        function renderNeeds(data) {
            const today = getToday();

            const needsHtml = data.needs.map(n => `
                <div class="need-item">
                    <div class="n-left">
                        <span class="n-title">${n.title}</span>
                        <span class="n-count">(${n.count} بار)</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span class="n-stars">${n.stars}</span>
                        <span class="n-weight">وزن ${n.score}</span>
                        <span class="n-last">${toPersianDate(n.lastSeen)}</span>
                    </div>
                </div>
            `).join('');

            const interestsHtml = data.interests.map(i => `
                <div class="need-item">
                    <div class="n-left">
                        <span class="n-title">${i.title}</span>
                        <span class="n-count">(${i.count} بار)</span>
                    </div>
                    <div style="display:flex;align-items:center;gap:6px;">
                        <span class="n-stars">${i.stars}</span>
                        <span class="n-weight">وزن ${i.score}</span>
                        <span class="n-last">${toPersianDate(i.lastSeen)}</span>
                    </div>
                </div>
            `).join('');

            const prioritiesHtml = data.priorities.slice(0, 10).map((p, index) => `
                <div class="priority-item">
                    <span class="p-rank">#${index + 1}</span>
                    <span class="p-title">${p.title}</span>
                    <span class="p-count">${p.count} بار</span>
                    <span class="p-stars">${p.stars}</span>
                    <span class="p-badge">${p.category || 'نیاز/علاقه'}</span>
                </div>
            `).join('');

            return `
                <div class="glass">
                    <div class="card-title">
                        <i class="fas fa-heart"></i> نیازها و علاقه‌ها
                        <span class="badge-count">${data.priorities.length} اولویت</span>
                    </div>
                    <div class="window-info">
                        <span class="win-item">📅 امروز: <span class="num">${toPersianDate(today)}</span></span>
                        <span class="win-item">📊 ${data.needs.length} نیاز · ${data.interests.length} علاقه</span>
                    </div>

                    <!-- اولویت‌ها -->
                    <div style="margin-top:8px;margin-bottom:12px;">
                        <div style="font-size:0.5rem;color:#13f4d2;margin-bottom:6px;font-weight:600;">
                            <i class="fas fa-crown"></i> اولویت‌های برتر
                        </div>
                        <div class="priority-list">
                            ${prioritiesHtml}
                        </div>
                    </div>

                    <!-- تب‌ها -->
                    <div class="tabs">
                        <button class="tab-btn ${needsTab === 'needs' ? 'active' : ''}" onclick="switchNeedsTab('needs')">
                            <i class="fas fa-list"></i> نیازها (${data.needs.length})
                        </button>
                        <button class="tab-btn ${needsTab === 'interests' ? 'active' : ''}" onclick="switchNeedsTab('interests')">
                            <i class="fas fa-star"></i> علاقه‌ها (${data.interests.length})
                        </button>
                    </div>

                    <div class="tab-content ${needsTab === 'needs' ? 'active' : ''}" id="tab-needs">
                        <div class="needs-column">
                            <div class="col-title"><i class="fas fa-list"></i> نیازها</div>
                            ${needsHtml || '<div style="font-size:0.4rem;color:rgba(19,244,210,0.2);text-align:center;padding:10px 0;">هیچ نیازی ثبت نشده است</div>'}
                        </div>
                    </div>

                    <div class="tab-content ${needsTab === 'interests' ? 'active' : ''}" id="tab-interests">
                        <div class="needs-column">
                            <div class="col-title"><i class="fas fa-star"></i> علاقه‌ها</div>
                            ${interestsHtml || '<div style="font-size:0.4rem;color:rgba(19,244,210,0.2);text-align:center;padding:10px 0;">هیچ علاقه‌ای ثبت نشده است</div>'}
                        </div>
                    </div>

                    <div style="font-size:0.35rem;color:rgba(19,244,210,0.15);text-align:center;margin-top:8px;">
                        ⭐ ستاره‌ها بر اساس تعداد تکرار: هر ۳ بار = ۱ ستاره
                    </div>
                </div>
            `;
        }

        // ============================================================
        // SWITCH NEEDS TAB
        // ============================================================
        window.switchNeedsTab = function(tab) {
            needsTab = tab;
            render();
        };

        // ============================================================
        // TOGGLE CARD
        // ============================================================
        window.toggleCard = function(id) {
            expandedCard = expandedCard === id ? null : id;
            render();
        };

        // ============================================================
        // NAVIGATION
        // ============================================================
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('sidebarOverlay').classList.add('active');
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('active');
        }

        document.getElementById('menuBtn').addEventListener('click', openSidebar);
        document.getElementById('closeSidebar').addEventListener('click', closeSidebar);
        document.getElementById('sidebarOverlay').addEventListener('click', closeSidebar);

        document.querySelectorAll('.sidebar-nav .menu-item[data-page]').forEach(item => {
            item.addEventListener('click', function() {
                currentPage = this.dataset.page;
                document.querySelectorAll('.sidebar-nav .menu-item').forEach(m => m.classList.remove('active'));
                this.classList.add('active');
                closeSidebar();
                render();
            });
        });

        // ============================================================
        // START
        // ============================================================
        render();

        console.log('🧠 PROJECT 721 — سیستم جامع با محورهای پروفایل دقیق');
        console.log(`📊 ${RECORDS.length} مشاهده بارگذاری شد`);
        console.log('📋 محورهای پروفایل: اعتماد، ثبات، گشودگی، دلبستگی، کنترل');
        console.log('🎯 هر محور تگ‌های مخصوص خود را دارد');
        console.log('📅 امروز:', toPersianDate(getToday()));
    </script>

</body>
</html>
