<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>PROJECT 721+ · تحلیل رفتار</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        /* ============================================================
           ROOT VARIABLES
           ============================================================ */
        :root {
            --bg-primary: #070A12;
            --bg-secondary: #0B0F1A;
            --bg-card: rgba(12, 18, 30, 0.4);
            --bg-card-hover: rgba(12, 18, 30, 0.6);
            --border-subtle: rgba(60, 90, 140, 0.05);
            --border-glass: rgba(60, 90, 140, 0.035);
            --text-primary: #E8EDF5;
            --text-secondary: #8899B5;
            --text-muted: #4A6080;
            --text-accent: #7AB7FF;
            --blue: #4A7AFF;
            --teal: #38D9A9;
            --purple: #8B5CF6;
            --amber: #F59E0B;
            --red: #EF4444;
            --green: #34D399;
            --glass-bg: rgba(10, 16, 28, 0.25);
            --radius: 14px;
            --radius-sm: 8px;
            --radius-pill: 30px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            --transition: all 0.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
            background: radial-gradient(ellipse at 20% 30%, #0C1520, var(--bg-primary));
        }

        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.01);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(74, 122, 255, 0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(74, 122, 255, 0.18);
        }

        /* ============================================================
           TOP NAV — با جستجو
           ============================================================ */
        #topnav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 28px;
            background: rgba(10, 16, 28, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            min-height: 54px;
            flex-shrink: 0;
            z-index: 10;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            object-fit: contain;
            opacity: 0.9;
        }

        .nav-brand {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .nav-brand-plus {
            font-size: 0.5rem;
            color: var(--purple);
            font-weight: 600;
            background: rgba(139, 92, 246, 0.08);
            padding: 2px 10px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(139, 92, 246, 0.06);
            margin-right: 6px;
        }

        .nav-divider {
            width: 1px;
            height: 18px;
            background: var(--border-glass);
        }

        .nav-search {
            background: rgba(60, 90, 140, 0.04);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-pill);
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
            font-size: 0.55rem;
            transition: var(--transition);
            min-width: 220px;
            flex: 1;
            max-width: 400px;
        }

        .nav-search:focus-within {
            border-color: rgba(74, 122, 255, 0.15);
            background: rgba(60, 90, 140, 0.06);
        }

        .nav-search i {
            font-size: 0.5rem;
            color: var(--text-muted);
        }

        .nav-search input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            font-size: 0.55rem;
            font-family: inherit;
            flex: 1;
            width: 100%;
        }

        .nav-search input::placeholder {
            color: var(--text-muted);
        }

        .nav-search .search-shortcut {
            font-size: 0.4rem;
            color: var(--text-muted);
            background: rgba(60, 90, 140, 0.04);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid var(--border-glass);
            font-weight: 400;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ============================================================
           PROFILE HEADER
           ============================================================ */
        #profile-header {
            background: rgba(10, 16, 28, 0.25);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 14px 28px;
            flex-shrink: 0;
        }

        .profile-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .profile-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .profile-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: 2px solid rgba(74, 122, 255, 0.08);
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(74, 122, 255, 0.04);
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .profile-avatar .avatar-fallback {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-accent);
            background: linear-gradient(135deg, rgba(74, 122, 255, 0.06), rgba(139, 92, 246, 0.06));
        }

        .profile-name {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .profile-id {
            font-size: 0.5rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .profile-status {
            font-size: 0.45rem;
            color: var(--green);
            background: rgba(52, 211, 153, 0.06);
            padding: 2px 12px;
            border-radius: var(--radius-pill);
            border: 1px solid rgba(52, 211, 153, 0.06);
        }

        .profile-stats {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .profile-stat {
            background: rgba(16, 28, 48, 0.04);
            padding: 3px 12px;
            border-radius: var(--radius-pill);
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 0.4rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-glass);
        }

        .profile-stat .num {
            color: var(--text-primary);
            font-weight: 600;
        }

        .profile-stat .num.confirmed {
            color: var(--green);
        }
        .profile-stat .num.review {
            color: var(--amber);
        }
        .profile-stat .num.contradiction {
            color: var(--red);
        }

        /* ============================================================
           INSIGHTS
           ============================================================ */
        #insights {
            background: rgba(10, 16, 28, 0.25);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-glass);
            padding: 12px 28px;
            flex-shrink: 0;
        }

        .insights-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
            gap: 10px;
        }

        .insight-item {
            background: rgba(16, 28, 48, 0.04);
            border-radius: var(--radius-sm);
            padding: 8px 12px;
            border: 1px solid var(--border-glass);
            transition: var(--transition);
        }

        .insight-item:hover {
            background: rgba(16, 28, 48, 0.08);
        }

        .insight-item .insight-label {
            font-size: 0.4rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .insight-item .insight-value {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-top: 2px;
        }

        .insight-item .insight-sub {
            font-size: 0.35rem;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .insight-item .insight-tag {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: var(--radius-pill);
            display: inline-block;
            margin-top: 3px;
        }

        .insight-tag.strong {
            background: rgba(52, 211, 153, 0.06);
            color: var(--green);
        }
        .insight-tag.challenge {
            background: rgba(245, 158, 11, 0.06);
            color: var(--amber);
        }
        .insight-tag.contradiction {
            background: rgba(239, 68, 68, 0.06);
            color: var(--red);
        }
        .insight-tag.missing {
            background: rgba(100, 100, 140, 0.06);
            color: var(--text-muted);
        }
        .insight-tag.suggestion {
            background: rgba(74, 122, 255, 0.06);
            color: var(--text-accent);
        }

        /* ============================================================
           MAIN CONTENT
           ============================================================ */
        #main-content {
            flex: 1;
            padding: 16px 28px 28px 28px;
            overflow-y: auto;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            align-content: start;
        }

        .section-full {
            grid-column: 1 / -1;
        }

        /* ============================================================
           GLASS CARDS
           ============================================================ */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius);
            padding: 12px 14px;
            transition: var(--transition);
        }

        .glass:hover {
            background: var(--bg-card);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-title {
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-title .badge {
            font-size: 0.35rem;
            padding: 1px 8px;
            border-radius: var(--radius-pill);
            background: rgba(60, 90, 140, 0.04);
            color: var(--text-secondary);
            font-weight: 400;
        }

        /* ============================================================
           DIMENSION CARDS
           ============================================================ */
        .dim-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }

        .dim-card {
            background: rgba(16, 28, 48, 0.04);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            border-right: 2px solid rgba(74, 122, 255, 0.06);
            cursor: pointer;
            transition: var(--transition);
        }

        .dim-card:hover {
            background: rgba(16, 28, 48, 0.08);
            transform: translateX(-2px);
        }

        .dim-card .dc-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dim-card .dc-name {
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .dim-card .dc-conf {
            font-size: 0.45rem;
            font-weight: 600;
            padding: 1px 10px;
            border-radius: var(--radius-pill);
        }

        .dim-card .dc-conf.high {
            background: rgba(52, 211, 153, 0.06);
            color: var(--green);
        }
        .dim-card .dc-conf.medium {
            background: rgba(245, 158, 11, 0.06);
            color: var(--amber);
        }
        .dim-card .dc-conf.low {
            background: rgba(100, 100, 140, 0.06);
            color: var(--text-muted);
        }
        .dim-card .dc-conf.contradiction {
            background: rgba(239, 68, 68, 0.06);
            color: var(--red);
        }

        .dim-card .dc-meta {
            display: flex;
            gap: 6px;
            font-size: 0.35rem;
            color: var(--text-muted);
            margin-top: 2px;
            flex-wrap: wrap;
        }

        .dim-card .dc-summary {
            font-size: 0.45rem;
            color: var(--text-secondary);
            margin-top: 4px;
            line-height: 1.5;
            padding: 4px 6px;
            background: rgba(16, 28, 48, 0.02);
            border-radius: 4px;
            border-right: 2px solid rgba(74, 122, 255, 0.04);
        }

        .dim-card .dc-bar {
            width: 100%;
            height: 2px;
            background: rgba(60, 90, 140, 0.04);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 4px;
        }

        .dim-card .dc-bar .dc-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.8s ease;
        }

        /* ============================================================
           DETAIL EXPAND
           ============================================================ */
        .dim-card .dc-detail {
            display: none;
            margin-top: 6px;
            padding-top: 6px;
            border-top: 1px solid var(--border-glass);
            font-size: 0.45rem;
            color: var(--text-secondary);
        }

        .dim-card .dc-detail.open {
            display: block;
        }

        .dc-detail .dd-row {
            display: flex;
            justify-content: space-between;
            padding: 2px 0;
            border-bottom: 1px solid rgba(60, 90, 140, 0.02);
        }

        .dc-detail .dd-row .dd-label {
            color: var(--text-muted);
        }
        .dc-detail .dd-row .dd-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .dc-detail .dd-evidence {
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(74, 122, 255, 0.04);
            border-radius: 4px;
            font-size: 0.4rem;
            color: var(--text-secondary);
            border-right: 2px solid rgba(74, 122, 255, 0.06);
        }

        .dc-detail .dd-counter {
            margin-top: 4px;
            padding: 4px 8px;
            background: rgba(239, 68, 68, 0.04);
            border-radius: 4px;
            font-size: 0.4rem;
            color: var(--red);
            border-right: 2px solid rgba(239, 68, 68, 0.06);
        }

        .dc-detail .dd-chips {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 4px;
        }

        .dc-detail .dd-chips .chip {
            font-size: 0.35rem;
            padding: 2px 8px;
            border-radius: var(--radius-pill);
            background: rgba(74, 122, 255, 0.04);
            border: 1px solid rgba(74, 122, 255, 0.04);
            color: var(--text-secondary);
        }

        /* ============================================================
           SUMMARY
           ============================================================ */
        .summary-text {
            font-size: 0.6rem;
            color: var(--text-secondary);
            line-height: 1.8;
            padding: 2px 0;
        }

        .summary-text strong {
            color: var(--text-primary);
        }

        .summary-text .highlight {
            color: var(--text-accent);
        }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 1200px) {
            .insights-grid {
                grid-template-columns: 1fr 1fr 1fr;
            }
            .dim-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 900px) {
            #main-content {
                grid-template-columns: 1fr;
                padding: 12px 16px;
            }
            .section-full {
                grid-column: 1;
            }
            .insights-grid {
                grid-template-columns: 1fr 1fr;
            }
            .dim-grid {
                grid-template-columns: 1fr 1fr;
            }
            #topnav {
                padding: 8px 16px;
                flex-wrap: wrap;
                gap: 8px;
            }
            .nav-search {
                min-width: 150px;
                max-width: 100%;
                order: 3;
                flex: 1 1 100%;
            }
            #profile-header {
                padding: 10px 16px;
            }
            #insights {
                padding: 10px 16px;
            }
            .profile-stats {
                gap: 4px;
            }
            .profile-stat {
                font-size: 0.35rem;
                padding: 2px 8px;
            }
        }

        @media (max-width: 600px) {
            .insights-grid {
                grid-template-columns: 1fr;
            }
            .dim-grid {
                grid-template-columns: 1fr;
            }
            #main-content {
                padding: 8px 10px;
            }
            #topnav {
                padding: 6px 10px;
            }
            #profile-header {
                padding: 8px 10px;
            }
            #insights {
                padding: 8px 10px;
            }
            .profile-left {
                gap: 10px;
            }
            .profile-avatar {
                width: 40px;
                height: 40px;
            }
            .profile-name {
                font-size: 0.85rem;
            }
            .glass {
                padding: 8px 10px;
            }
            .dim-card {
                padding: 6px 8px;
            }
            .dim-card .dc-summary {
                font-size: 0.4rem;
            }
            .nav-search {
                min-width: 100%;
            }
            .nav-search .search-shortcut {
                display: none;
            }
        }
    </style>
</head>
<body>

    <div id="app">

        <!-- ============================================================
        TOP NAV — با جستجو
        ============================================================ -->
        <header id="topnav">
            <div class="nav-left">
                <img class="logo" src="https://uploadkon.ir/uploads/bc8d07_26ChatGPT-Image-Jul-7-2026-07-35-41-PM.png" alt="PROJECT 721" />
                <span class="nav-brand">PROJECT 721<span class="nav-brand-plus">+</span></span>
                <span class="nav-divider"></span>
                <span class="nav-person">MR721AS · عباس</span>
            </div>

            <div class="nav-search">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="جستجو در مشاهدات، الگوها، ابعاد..." />
                <span class="search-shortcut">⌘K</span>
            </div>

            <div class="nav-right"></div>
        </header>

        <!-- ============================================================
        PROFILE HEADER
        ============================================================ -->
        <div id="profile-header">
            <div class="profile-top">
                <div class="profile-left">
                    <div class="profile-avatar">
                        <img src="https://uploadkon.ir/uploads/8edd12_26photo-2026-06-11-21-44-46.png" alt="عباس" />
                    </div>
                    <div>
                        <div class="profile-name">عباس</div>
                        <div class="profile-id">MR721AS · آخرین بروزرسانی: ۱۴۰۵-۰۴-۱۲</div>
                    </div>
                    <span class="profile-status"><i class="fas fa-circle" style="font-size:0.3rem;"></i> مبتنی بر شواهد</span>
                </div>
                <div class="profile-stats" id="profileStats">
                    <!-- توسط JS پر می‌شود -->
                </div>
            </div>
        </div>

        <!-- ============================================================
        INSIGHTS
        ============================================================ -->
        <div id="insights">
            <div class="insights-grid" id="insightsGrid">
                <!-- توسط JS پر می‌شود -->
            </div>
        </div>

        <!-- ============================================================
        MAIN CONTENT
        ============================================================ -->
        <div id="main-content">

            <!-- ==========================================================
            DIMENSIONS
            ========================================================== -->
            <div class="glass section-full">
                <div class="card-header">
                    <span class="card-title"><i class="fas fa-brain"></i> ابعاد شخصیت</span>
                    <span class="badge" id="dimCount">۰ بعد</span>
                </div>
                <div class="dim-grid" id="dimGrid">
                    <!-- توسط JS پر می‌شود -->
                </div>
            </div>

            <!-- ==========================================================
            SUMMARY
            ========================================================== -->
            <div class="glass section-full">
                <div class="card-header">
                    <span class="card-title"><i class="fas fa-file-lines"></i> خلاصه تحلیل</span>
                    <span class="badge">بر اساس شواهد</span>
                </div>
                <div class="summary-text" id="summaryText">
                    <!-- توسط JS پر می‌شود -->
                </div>
            </div>

        </div>

    </div>

    <script>
        /**
         * ============================================================
         * PROJECT 721+ — Data-Driven Behavior Analysis Dashboard
         * ============================================================
         * 
         * تمام داده‌ها در این آرایه مرکزی قرار دارند.
         * هر تغییری در این آرایه، کل سیستم را به‌روز می‌کند.
         * هیچ عدد ساختگی وجود ندارد.
         * ============================================================
         */

        // ============================================================
        // DATA — تنها جایی که داده‌ها ذخیره می‌شوند
        // ============================================================

        const DATA = {
            person: {
                id: 'MR721AS',
                name: 'عباس',
                created: '۱۴۰۵-۰۴-۱۰',
                updated: '۱۴۰۵-۰۴-۱۲'
            },

            // ===== مشاهدات =====
            observations: [
                { id: 'OBS-001', date: '۱۴۰۵-۰۴-১০', dimension: 'استرس', desc: 'تا پایان شب پاسخی دریافت نشد.',
                    evidence: true },
                { id: 'OBS-002', date: '۱۴۰۵-۰۴-۱۱', dimension: 'ارتباط', desc: 'تماس ۵ دقیقه‌ای', evidence: true },
                { id: 'OBS-003', date: '۱۴۰۵-۰۴-۱۲', dimension: 'ارزش‌ها', desc: 'گفت: "قول می‌دم" و انجام داد',
                    evidence: true },
                { id: 'OBS-004', date: '۱۴۰۵-۰۴-۱۲', dimension: 'ارتباط', desc: 'شروع گفتگو نکرد', evidence: true },

        // ============================================================
        // ENGINE — محاسبه‌گرهای داده‌محور
        // ============================================================

        const Engine = {
            // ---- آمار کلی ----
            getStats: function() {
                const totalObs = DATA.observations.length;
                const totalPatterns = DATA.patterns.length;
                const totalHyp = DATA.hypotheses.length;
                const confirmed = DATA.hypotheses.filter(h => h.status === 'confirmed').length;
                const review = DATA.hypotheses.filter(h => h.status === 'review').length;
                const contradictions = DATA.contradictions.length;

                return { totalObs, totalPatterns, totalHyp, confirmed, review, contradictions };
            },

            // ---- محاسبه ابعاد ----
            getDimensions: function() {
                const dims = {};
                const obs = DATA.observations;
                const patterns = DATA.patterns;
                const hyps = DATA.hypotheses;
                const cons = DATA.contradictions;

                const allDims = Object.keys(DATA.dimensions);

                allDims.forEach(dim => {
                    const obsCount = obs.filter(o => o.dimension === dim).length;
                    const evidenceCount = obs.filter(o => o.dimension === dim && o.evidence === true).length;
                    const patternCount = patterns.filter(p => p.dimension === dim).length;
                    const contradictionCount = cons.filter(c => c.dimension === dim).length;

                    let confidence = 0;
                    if (obsCount > 0) {
                        confidence = Math.round((evidenceCount / obsCount) * 100);
                    }

                    let status = 'low';
                    if (confidence >= 70 && contradictionCount === 0) status = 'high';
                    else if (confidence >= 40 && contradictionCount <= 1) status = 'medium';
                    else if (contradictionCount > 0) status = 'contradiction';

                    dims[dim] = {
                        name: DATA.dimensions[dim]?.name || dim,
                        summary: DATA.dimensions[dim]?.summary || '',
                        obsCount,
                        evidenceCount,
                        patternCount,
                        contradictionCount,
                        confidence,
                        status,
                        observations: obs.filter(o => o.dimension === dim).map(o => o.id),
                        patterns: patterns.filter(p => p.dimension === dim).map(p => p.id),
                        evidences: obs.filter(o => o.dimension === dim && o.evidence === true).map(o => o.id),
                    };
                });

                return dims;
            },

            // ---- Insights ----
            getInsights: function() {
                const dims = this.getDimensions();
                const stats = this.getStats();

                let strongest = null;
                let strongestConf = -1;
                for (const [key, dim] of Object.entries(dims)) {
                    if (dim.status === 'high' && dim.contradictionCount === 0 && dim.confidence > strongestConf) {
                        strongest = key;
                        strongestConf = dim.confidence;
                    }
                }

                let challenge = 'ارتباط';
                let challengeConf = dims['ارتباط']?.confidence || 0;

                let maxContradiction = null;
                let maxContradictionCount = 0;
                for (const [key, dim] of Object.entries(dims)) {
                    if (dim.contradictionCount > maxContradictionCount) {
                        maxContradiction = key;
                        maxContradictionCount = dim.contradictionCount;
                    }
                }

                let missingData = null;
                let minCoverage = 101;
                for (const [key, dim] of Object.entries(dims)) {
                    if (dim.obsCount < 5 && dim.obsCount < minCoverage) {
                        missingData = key;
                        minCoverage = dim.obsCount;
                    }
                }
                if (!missingData) {
                    for (const [key, dim] of Object.entries(dims)) {
                        if (dim.obsCount < minCoverage) {
                            missingData = key;
                            minCoverage = dim.obsCount;
                        }
                    }
                }

                return {
                    strongest: strongest || 'نامشخص',
                    strongestConf: strongestConf,
                    challenge: challenge,
                    challengeConf: challengeConf,
                    contradiction: maxContradiction || 'ندارد',
                    contradictionCount: maxContradictionCount,
                    missingData: missingData || 'همه ابعاد داده کافی دارند',
                    coverage: Math.round((stats.totalObs / (Object.keys(dims).length * 10)) * 100)
                };
            },

            // ---- خلاصه ----
            getSummary: function() {
                const stats = this.getStats();
                const insights = this.getInsights();

                let summary = '';
                summary += `<strong>${stats.totalObs}</strong> مشاهده ثبت شده است.\n`;
                summary += `<strong>${stats.totalPatterns}</strong> الگو مستند شده است.\n`;
                summary += `<strong>${stats.confirmed}</strong> فرضیه تأیید شده است.\n`;
                if (stats.contradictions > 0) {
                    summary +=
                        `<span style="color:var(--red);">${stats.contradictions}</span> تناقض حل‌نشده باقی مانده است.\n\n`;
                } else {
                    summary += `هیچ تناقضی ثبت نشده است.\n\n`;
                }

                if (insights.strongest) {
                    summary +=
                        `<span class="highlight">نقطه قوت اصلی:</span> ${insights.strongest} (${insights.strongestConf}%)\n`;
                }
                summary +=
                    `<span class="highlight">چالش اصلی:</span> ${insights.challenge} (${insights.challengeConf}%)\n`;

                if (insights.contradictionCount > 0) {
                    summary +=
                        `<span class="highlight">تناقض مهم:</span> ${insights.contradiction} (${insights.contradictionCount} تناقض)\n`;
                }

                if (insights.missingData) {
                    summary +=
                        `\n<span style="color:var(--text-muted);font-size:0.5rem;">⚠️ حوزه‌های ${insights.missingData} نیاز به داده بیشتر دارند.\n`;
                    summary += `💡 پیشنهاد: رفتار در این حوزه را بیشتر ثبت کنید.</span>`;
                }

                return summary;
            },

            // ---- جستجو ----
            search: function(query) {
                if (!query || query.trim() === '') {
                    return { observations: [], patterns: [], dimensions: [] };
                }

                const q = query.trim().toLowerCase();
                const results = {
                    observations: [],
                    patterns: [],
                    dimensions: []
                };

                // جستجو در مشاهدات
                DATA.observations.forEach(obs => {
                    const searchable = [obs.id, obs.desc, obs.dimension, obs.date].join(' ').toLowerCase();
                    if (searchable.includes(q)) {
                        results.observations.push(obs);
                    }
                });

                // جستجو در الگوها
                DATA.patterns.forEach(p => {
                    const searchable = [p.id, p.desc, p.dimension].join(' ').toLowerCase();
                    if (searchable.includes(q)) {
                        results.patterns.push(p);
                    }
                });

                // جستجو در ابعاد
                Object.keys(DATA.dimensions).forEach(key => {
                    const dim = DATA.dimensions[key];
                    const searchable = [key, dim.name, dim.summary].join(' ').toLowerCase();
                    if (searchable.includes(q)) {
                        results.dimensions.push({ key, ...dim });
                    }
                });

                return results;
            },

            // ---- هایلایت جستجو ----
            highlightResults: function(query) {
                const results = this.search(query);
                const dims = this.getDimensions();

                // هایلایت کارت‌های ابعاد
                document.querySelectorAll('.dim-card').forEach(card => {
                    const name = card.querySelector('.dc-name')?.textContent || '';
                    const summary = card.querySelector('.dc-summary')?.textContent || '';
                    const searchable = (name + ' ' + summary).toLowerCase();

                    if (query && query.trim() !== '' && !searchable.includes(query.trim().toLowerCase())) {
                        card.style.opacity = '0.3';
                        card.style.transform = 'scale(0.98)';
                    } else {
                        card.style.opacity = '1';
                        card.style.transform = 'scale(1)';
                    }
                });

                return results;
            }
        };

        document.getElementById('searchInput').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            const query = this.value;

            searchTimeout = setTimeout(() => {
                if (query && query.trim() !== '') {
                    const results = Engine.highlightResults(query);

                    // نمایش نتایج در کنسول (برای توسعه‌دهنده)
                    console.log('🔍 نتایج جستجو:', results);

                    // به‌روزرسانی خلاصه با نتایج جستجو
                    const summaryEl = document.getElementById('summaryText');
                    if (results.observations.length > 0 || results.patterns.length > 0 || results.dimensions
                        .length > 0) {
                        let searchSummary = `<span style="color:var(--text-accent);">🔍 نتایج جستجو برای "${query}":</span>\n\n`;

                        if (results.observations.length > 0) {

                        }

                        if (results.dimensions.length > 0) {
                            searchSummary +=
                                `<strong>${results.dimensions.length}</strong> بعد یافت شد: `;
                            searchSummary += results.dimensions.map(d => d.name).join('، ') + '\n';
                        }

                        summaryEl.innerHTML = searchSummary;
                    } else {
                        // اگر نتیجه‌ای پیدا نشد، خلاصه اصلی را برگردان
                        summaryEl.innerHTML = Engine.getSummary();
                    }
                } else {
                    // اگر جستجو خالی بود، خلاصه اصلی را برگردان
                    document.querySelectorAll('.dim-card').forEach(card => {
                        card.style.opacity = '1';
